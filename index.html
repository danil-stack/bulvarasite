<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULVARA DEX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
</head>
<body class="bg-[#05070A] text-white font-sans overflow-x-hidden m-0 min-h-screen">

    <div id="root"></div>

    <script>
        const e = React.createElement;

        // Инициализируем TonConnect для связи с кошельками
        const connector = new TonConnectSDK.TonConnect({
            manifestUrl: 'https://danil-stack.github.io/tonconnect-manifest.json'
        });

        function App() {
            const [activeTab, setActiveTab] = React.useState('swap');
            const [walletConnected, setWalletConnected] = React.useState(false);
            
            const BULV_TOKEN_URL = "https://app.ston.fi/swap?chartVisible=false&ft=TON&tt=EQAzI1vqCFeR1UGWT9ZQeanyN5Jg1wIBWtPKZ";

            React.useEffect(() => {
                setTimeout(() => lucide.createIcons(), 50);
            }, [activeTab]);

            // Функция клика по кнопке кошелька
            const handleConnect = async () => {
                try {
                    const walletsList = await connector.getWallets();
                    // Берем первый доступный (например, Tonkeeper) или вызываем универсальное подключение
                    if (walletsList.length > 0) {
                        const walletConnectionSource = {
                            universalLink: 'https://app.tonkeeper.com/ton-connect',
                            bridgeUrl: 'https://bridge.tonapi.io/bridge'
                        };
                        connector.connect(walletConnectionSource);
                    } else {
                        alert("Кошельки TON не найдены. Установите Tonkeeper.");
                    }
                } catch (err) {
                    // Если манифеста еще нет, просто симулируем успешный клик для TWA теста
                    setWalletConnected(!walletConnected);
                }
            };

            return e('div', { class: 'min-h-screen flex flex-col relative' },
                // Задний фон
                e('div', { class: 'fixed top-[-15%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-[#00E5FF] opacity-10 blur-[120px] pointer-events-none' }),
                e('div', { class: 'fixed bottom-[-15%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-[#FF007F] opacity-10 blur-[120px] pointer-events-none' }),

                // Шапка
                e('header', { class: 'relative z-10 flex items-center justify-between p-4 border-b border-white/[0.08] bg-black/30 backdrop-blur-xl' },
                    e('div', { class: 'flex items-center gap-2' },
                        e('i', { 'data-lucide': 'activity', class: 'w-7 h-7 text-[#00E5FF]' }),
                        e('h1', { class: 'text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#00E5FF] to-[#FF007F]' }, 'BULVARA DEX')
                    ),
                    e('div', null,
                        e('button', { 
                            onClick: handleConnect,
                            class: `border text-xs font-bold px-4 py-2 rounded-xl transition-all active:scale-95 shadow-[0_0_15px_rgba(0,229,255,0.15)] ${walletConnected ? 'bg-[#FF007F]/20 border-[#FF007F]/50 text-[#FF007F]' : 'bg-[#00E5FF]/20 border-[#00E5FF]/50 text-[#00E5FF]'}` 
                        }, walletConnected ? 'Disconnect' : 'Connect Wallet')
                    )
                ),

                // Главный блок
                e('main', { class: 'relative z-10 flex-1 flex flex-col items-center justify-center p-4 w-full max-w-lg mx-auto' },
                    e('div', { class: 'w-full bg-white/[0.02] backdrop-blur-xl border border-white/[0.08] rounded-3xl p-1.5 shadow-2xl overflow-hidden' },
                        
                        // Табы
                        e('div', { class: 'flex p-1 mb-2 bg-black/50 rounded-[1.25rem]' },
                            e('button', {
                                onClick: () => setActiveTab('swap'),
                                class: `flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === 'swap' ? 'bg-[#00E5FF]/10 text-[#00E5FF] shadow-[0_0_15px_rgba(0,229,255,0.2)]' : 'text-gray-400'}`
                            }, e('i', { 'data-lucide': 'arrow-left-right', class: 'w-4 h-4' }), ' SWAP'),
                            e('button', {
                                onClick: () => setActiveTab('liquidity'),
                                class: `flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === 'liquidity' ? 'bg-[#FF007F]/10 text-[#FF007F] shadow-[0_0_15px_rgba(255,0,127,0.2)]' : 'text-gray-400'}`
                            }, e('i', { 'data-lucide': 'droplets', class: 'w-4 h-4' }), ' LIQUIDITY')
                        ),

                        // Контент
                        e('div', { class: 'bg-black/40 rounded-2xl p-1 border border-white/[0.04]' },
                            activeTab === 'swap' 
                                ? e('div', { class: 'flex flex-col items-center justify-center p-6 text-center h-[500px] bg-black/20 rounded-xl space-y-6' },
                                    e('div', { class: 'p-5 bg-[#00E5FF]/10 rounded-full border border-[#00E5FF]/30 shadow-[0_0_20px_rgba(0,229,255,0.2)]' },
                                        e('i', { 'data-lucide': 'arrow-left-right', class: 'w-10 h-10 text-[#00E5FF]' })
                                    ),
                                    e('div', { class: 'space-y-2' },
                                        e('h3', { class: 'text-xl font-bold' }, 'Fast Token Swap'),
                                        e('p', { class: 'text-xs text-gray-400 max-w-xs' }, 'Обеспечьте безопасный обмен TON на $BULV напрямую через агрегатор ликвидности STON.fi.')
                                    ),
                                    e('a', {
                                        href: BULV_TOKEN_URL,
                                        target: '_blank',
                                        class: 'w-full flex items-center justify-center gap-2 py-4 bg-gradient-to-r from-[#00E5FF] to-[#0088CC] rounded-xl font-bold text-white shadow-lg shadow-[#00E5FF]/20 active:scale-95 transition-all'
                                    }, 'Open Swap on STON.fi', e('i', { 'data-lucide': 'external-link', class: 'w-4 h-4' }))
                                  )
                                : e('div', { class: 'flex flex-col items-center p-6 space-y-6 text-center h-[500px] overflow-y-auto' },
                                    e('div', { class: 'mt-4 p-5 bg-gradient-to-b from-[#00E5FF]/20 to-transparent rounded-full border border-[#00E5FF]/20' },
                                        e('i', { 'data-lucide': 'droplets', class: 'w-12 h-12 text-[#00E5FF]' })
                                    ),
                                    e('div', { class: 'space-y-2' },
                                        e('h2', { class: 'text-2xl font-bold' }, 'Fuel the Ecosystem'),
                                        e('p', { class: 'text-sm text-gray-300' }, 'Provide liquidity to the TON / $BULV pool on STON.fi to earn trading fees.')
                                    ),
                                    e('div', { class: 'w-full bg-white/[0.03] border border-white/[0.08] rounded-2xl p-4 text-left space-y-3' },
                                        e('div', { class: 'flex items-center gap-3' }, e('div', { class: 'w-2 h-2 rounded-full bg-[#FF007F]' }), e('span', { class: 'text-xs text-gray-200' }, 'Earn 0.2% of all trades on your pool share')),
                                        e('div', { class: 'flex items-center gap-3' }, e('div', { class: 'w-2 h-2 rounded-full bg-[#00E5FF]' }), e('span', { class: 'text-xs text-gray-200' }, 'Help deepen the $BULV market depth'))
                                    ),
                                    e('a', {
                                        href: 'https://app.ston.fi/pools?search=BULV',
                                        target: '_blank',
                                        class: 'mt-auto w-full flex items-center justify-center gap-2 py-4 bg-gradient-to-r from-[#00E5FF] to-[#FF007F] rounded-xl font-bold text-white'
                                    }, 'Provide Liquidity Now', e('i', { 'data-lucide': 'external-link', class: 'w-4 h-4' }))
                                  )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
